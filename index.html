        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Orbitron', sans-serif;
            background-color: #000;
            color: #fff;
            overflow: hidden;
        }

        .container {

            width: 100%;
            height: 100%;
        }

        /* SIDE PANELS */
        .side {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            transition: 0.5s ease;
            position: relative;
        }

        /* LEFT SIDE: SUBJECT (THE SURVIVOR) */
        .subject {
            background-color: #000;
            border-right: 2px solid #00d2ff;
        }
        .subject:hover {

        }

        /* RIGHT SIDE: HERO (THE OPERATOR) */
        .hero {

            width: 250px; /* Restoring original size */
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }
        .side:hover .logo {
            transform: scale(1.1);
        }

        h1 {
            font-size: 2.5rem;
            letter-spacing: 5px;
            margin: 0;
            text-transform: uppercase;
        }

        .subject h1 { color: #00d2ff; }
        .hero h1 { color: #ff2d75; }

        p {
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: #666;
            margin-top: 10px;
        }

        /* HIDDEN MASTER NAVIGATION (Accessible via Hover or Footer) */
        .quick-nav {
            position: absolute;
            bottom: 40px;
            display: flex;
            gap: 20px;
            opacity: 0;
            transition: opacity 0.5s;
        }
        .side:hover .quick-nav {
            opacity: 1;
        }

        .nav-link {
            color: #fff;
            font-size: 0.6rem;
            text-decoration: none;
            border: 1px solid #444;
            padding: 5px 10px;
        }
        .nav-link:hover {
            border-color: #fff;
        }
    </style>
</head>
<body>
