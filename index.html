<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEAH.ORG | SEXYHEROS.ORG - Defending Human Dignity</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --aeah-blue: #004e92;
            --aeah-silver: #c0c0c0;
            --sexy-pink: #ff2d75;
            --dark-bg: #0a0a0a;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: var(--dark-bg);
            color: var(--white);
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
            width: 100vw;
            flex-direction: row;
        }

        /* Split Screen Styles */
        .split {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 5%;
            transition: all 0.5s ease;
            position: relative;
            text-align: center;
        }

        /* Left Side: AEAH */
        .aeah {
            background: linear-gradient(135deg, #000428 0%, #004e92 100%);
            border-right: 2px solid rgba(255,255,255,0.1);
        }

        /* Right Side: SEXYHEROS */
        .sexyheros {
            background: linear-gradient(135deg, #0a0a0a 0%, #2d0a1a 100%);
        }

        .logo {
            max-width: 280px;
            margin-bottom: 20px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }

        h2 {
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p {
            font-size: 1.1rem;
            max-width: 400px;
            line-height: 1.6;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .btn {
            text-decoration: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: bold;
            text-transform: uppercase;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .btn-blue {
            background-color: var(--white);
            color: var(--aeah-blue);
        }

        .btn-pink {
            background-color: var(--sexy-pink);
            color: var(--white);
            box-shadow: 0 0 20px rgba(255, 45, 117, 0.4);
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        /* Middle Divider Decor */
        .divider {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            background: var(--white);
            color: #000;
            padding: 10px;
            border-radius: 50%;
            font-weight: bold;
            font-size: 0.8rem;
        }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            .split {
                height: 50vh;
            }
            h2 { font-size: 1.8rem; }
            .logo { max-width: 180px; }
            .divider { display: none; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="divider">VS</div>

        <section class="split aeah">
            <img src="aeah_logo.png" alt="AEAH Logo" class="logo">
            <h2>The Shield</h2>
            <p>Against Electronic Abuse & Harassment. Legal advocacy, medical research, and cybersecurity for the modern victim.</p>
            <a href="#aeah-portal" class="btn btn-blue">Enter Defense</a>
        </section>

        <section class="split sexyheros">
            <img src="sexyheros_logo.png" alt="SexyHeros Logo" class="logo">
            <h2>The Mission</h2>
            <p>Reclaiming Goodness. A women-led program tackling tech addiction and device dependency. Turning "test subjects" into heroes.</p>
            <a href="#sexy-portal" class="btn btn-pink">Enter Recovery</a>
        </section>
    </div>

</body>
</html>
